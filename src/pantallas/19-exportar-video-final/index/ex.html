<section class="ex-screen" id="exRoot">
  <header class="ex-header app-card">
    <div>
      <p>Pantalla 12</p>
      <h2>Revisión y exportación</h2>
      <span>Revisa el orden de capas, genera el resultado final y aplica los subtítulos al último.</span>
    </div>

    <div class="ex-actions">
      <button id="exBtnVolverSubtitulos" class="ex-btn" type="button">Volver a subtítulos</button>
      <button id="exBtnGenerar" class="ex-btn ex-btn--primary" type="button">Generar video final</button>
    </div>
  </header>

  <main class="ex-content">
    <aside id="exResumen" class="ex-panel app-card"></aside>
    <section class="ex-workspace app-card">
      <div id="exCapas" class="ex-block"></div>
      <div id="exComparacion" class="ex-block"></div>
    </section>
  </main>
</section>
