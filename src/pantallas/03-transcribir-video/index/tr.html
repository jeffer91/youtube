<!-- =========================================================
Nombre completo: tr.html
Ruta o ubicación: /src/pantallas/03-transcribir-video/index/tr.html
Funciones principales:
- Crear la estructura visual base de la pantalla Transcribir video.
- Mantener contenedores separados para pasos, videos, opciones, progreso, resultado y acciones.
- Evitar lógica dentro del HTML.
- Servir como pantalla 03 de la app.
Con qué se conecta:
- tr.css
- tr.js
- tr-videos.js
- tr-controles.js
- tr-resultado.js
- tr-botones.js
========================================================= -->

<section class="tr-screen" id="trRoot">
  <div class="tr-layout">
    <aside class="tr-left app-card">
      <div class="tr-title">
        <p>Pantalla 03</p>
        <h2>Transcribir video</h2>
        <span>Convierte la voz del video en texto limpio, segmentos y subtítulos.</span>
      </div>

      <div id="trPasos" class="tr-steps" data-tr-zone="pasos"></div>
    </aside>

    <section class="tr-right">
      <div id="trMensajes" class="tr-messages" data-tr-zone="mensajes"></div>

      <div class="tr-top app-card">
        <div id="trSelectorVideos" data-tr-zone="selector-videos"></div>
        <div id="trResumenVideo" data-tr-zone="resumen-video"></div>
      </div>

      <div class="tr-grid">
        <div id="trOpciones" class="tr-panel app-card" data-tr-zone="opciones"></div>
        <div id="trProgreso" class="tr-panel app-card" data-tr-zone="progreso"></div>
      </div>

      <div id="trResultado" class="tr-result app-card" data-tr-zone="resultado"></div>

      <div id="trAcciones" class="tr-actions" data-tr-zone="acciones"></div>
    </section>
  </div>
</section>
