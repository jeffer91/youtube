<section class="tr-screen" id="trRoot">

      <div id="trMensajes"></div>

      <div class="tr-grid">
        <div id="trOpciones" class="tr-panel app-card"></div>
        <div id="trProgreso" class="tr-panel app-card"></div>
      </div>

      <div id="trAcciones"></div>
