<!-- =========================================================
Nombre completo: tr.html
Ruta o ubicación: /src/pantallas/03-transcribir-video/index/tr.html
Funciones principales:
- Crear la estructura visual base de la pantalla Transcripción y análisis.
- Usar un panel superior corto para pasos y acciones.
- Mantener contenedores separados para videos, opciones, progreso y resultado.
- Evitar lógica dentro del HTML.
- Servir como pantalla 03 del flujo profesional.
Con qué se conecta:
- tr.css
- tr-ajustes.css
- tr.js
- tr-videos.js
- tr-controles.js
- tr-resultado.js
- tr-botones.js
========================================================= -->

<section class="tr-screen" id="trRoot">
  <div class="tr-layout tr-layout--top">
    <header class="tr-left tr-header app-card">
      <div class="tr-header__main">
        <div class="tr-title">
          <p>Pantalla 03</p>
          <h2>Transcripción y análisis</h2>
          <span>Convierte la voz en texto, bloques de tiempo y datos para cortes, subtítulos y ritmo.</span>
        </div>

        <div id="trAcciones" class="tr-actions tr-actions--top" data-tr-zone="acciones"></div>
      </div>

      <div id="trPasos" class="tr-steps tr-steps--top" data-tr-zone="pasos"></div>
    </header>

    <section class="tr-right">
      <div id="trMensajes" class="tr-messages" data-tr-zone="mensajes"></div>

      <div class="tr-top app-card">
        <div id="trSelectorVideos" data-tr-zone="selector-videos"></div>
        <div id="trResumenVideo" data-tr-zone="resumen-video"></div>
      </div>

      <div class="tr-grid">
        <div id="trOpciones" class="tr-panel app-card" data-tr-zone="opciones"></div>
        <div id="trProgreso" class="tr-panel app-card" data-tr-zone="progreso"></div>
      </div>

      <div id="trResultado" class="tr-result app-card" data-tr-zone="resultado"></div>
    </section>
  </div>
</section>
