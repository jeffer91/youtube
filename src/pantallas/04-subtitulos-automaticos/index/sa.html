Nombre completo: sa.html
Ruta o ubicación: /src/pantallas/04-subtitulos-automaticos/index/sa.html
Funciones principales:
- Crear la estructura visual de Subtítulos automáticos.
- Preparar subtítulos como última capa visible.
- Elegir formato visual sin exportar todavía.
- Continuar a Exportar video final.

<section class="sa-screen" id="saRoot">
  <header class="sa-header app-card">
    <div>
      <p>Pantalla 11</p>
      <h2>Subtítulos automáticos</h2>
      <span>Prepara los subtítulos como última capa visible. El video final se genera recién en Exportar.</span>
    </div>

    <div class="sa-actions">
      <button id="saBtnVolverTranscripcion" class="sa-btn" type="button">Ir a transcripción</button>
      <button id="saBtnContinuar" class="sa-btn sa-btn--primary" type="button">Guardar subtítulos y continuar</button>
    </div>
  </header>

  <main class="sa-content">
    <aside id="saResumen" class="sa-panel app-card"></aside>

    <section class="sa-workspace app-card">
      <div id="saFormatos" class="sa-block"></div>
      <div id="saVideos" class="sa-block"></div>
    </section>
  </main>
</section>
