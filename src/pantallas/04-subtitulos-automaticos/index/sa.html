Nombre completo: sa.html

Funciones principales:
- Crear la estructura visual de Subtítulos automáticos.
- Mostrar resumen, formatos, videos, comparación antes/después y descargas.

Con qué se conecta:
- sa.css
- sa.js

<section class="sa-screen" id="saRoot">
  <header class="sa-header app-card">
    <div>
      <p>Pantalla 04</p>
      <h2>Subtítulos automáticos</h2>
      <span>Elige un formato, genera los subtítulos, compara antes/después y descarga el video final.</span>
    </div>

    <div class="sa-actions">
      <button id="saBtnVolverTranscripcion" class="sa-btn" type="button">Volver a transcripción</button>
      <button id="saBtnContinuar" class="sa-btn" type="button">Preparar subtítulos</button>
      <button id="saBtnGenerarVideo" class="sa-btn sa-btn--primary" type="button">Generar video con subtítulos</button>
    </div>
  </header>

  <main class="sa-content">
    <aside id="saResumen" class="sa-panel app-card"></aside>

    <section class="sa-workspace app-card">
      <div id="saFormatos" class="sa-block"></div>
      <div id="saVideos" class="sa-block"></div>
      <div id="saComparacion" class="sa-block"></div>
    </section>
  </main>
</section>
